name: Build macOS DMG

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-dmg:
    name: Build DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt pyinstaller

      - name: Bundle backend
        run: |
          pyinstaller \
            --clean \
            --onefile \
            --name linkedin-scan-api \
            --distpath frontend/electron/backend \
            --workpath build/pyinstaller \
            --specpath build/pyinstaller \
            backend/desktop_server.py

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build DMG
        working-directory: frontend
        run: npm run build && npx electron-builder --mac dmg --x64

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monetize360-LinkedIn-Scan-mac-dmg
          path: frontend/release/*.dmg
